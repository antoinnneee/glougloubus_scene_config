<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glougloubus Scene Configurator</title>
    <link rel="stylesheet" href="./style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>🚍 Glougloubus Scene Configurator</h1>
      </header>
      
      <main class="main-content">
        <div class="editor-column">
          <!-- Preview Panel -->
          <section class="panel preview-panel">
            <h2>LED Matrix Preview (192 x 32)</h2>
          <div class="canvas-container">
            <!-- Higher resolution matching 192x32 at scale of 5 for dot drawing -->
            <canvas id="led-canvas" width="960" height="160"></canvas>
            <!-- Overlay removed since drawing dots manually -->
          </div>
          <div class="preview-controls">
            <button id="btn-play-pause" class="btn primary">Play</button>
            <div class="fps-control">
              <label for="fps-input">FPS:</label>
              <input type="number" id="fps-input" value="20" min="1" max="60" />
            </div>
            <button id="btn-clear-canvas" class="btn outline danger">Clear Frame</button>
          </div>
        </section>

        <!-- Tools / Properties Panel -->
        <section class="panel tools-panel">
          <h2>Tools</h2>
          
          <div class="tool-group">
            <h3>Image Import</h3>
            <input type="file" id="image-upload" accept="image/*" />
            <div class="tool-controls">
              <label>X Ofs: <input type="number" id="img-x" value="0"></label>
              <label>Y Ofs: <input type="number" id="img-y" value="0"></label>
              <label>Scale: <input type="number" id="img-scale" value="1.0" step="0.1" min="0.1"></label>
            </div>
            <button id="btn-apply-image" class="btn">Apply to Canvas</button>
          </div>

          <div class="tool-group">
            <h3>Text Tool</h3>
            <input type="text" id="text-input" placeholder="Enter text..." />
            <div class="tool-controls">
              <label>Color: <input type="color" id="text-color" value="#ffffff"></label>
              <label>Size: <input type="number" id="text-size" value="16" min="8"></label>
            </div>
            <div class="tool-controls">
              <label>X: <input type="number" id="text-x" value="0"></label>
              <label>Y: <input type="number" id="text-y" value="16"></label>
            </div>
            <button id="btn-apply-text" class="btn">Draw Text</button>
          </div>

          <!-- Selected Item Tools -->
          <div class="tool-group" id="selection-tools" style="display: none;">
            <h3>Active Selection</h3>
            <button id="btn-delete-item" class="btn outline danger">Delete Selected Item</button>
          </div>

          <div class="tool-group">
            <h3>Pencil Tool</h3>
            <div class="tool-controls">
              <label>Color: <input type="color" id="pencil-color" value="#ff0000"></label>
            </div>
            <button id="btn-toggle-pencil" class="btn outline">Enable Pencil Mode</button>
          </div>

          <div class="tool-group">
            <h3>Item Animation Generator</h3>
            <p class="helper-text">Select an item, then configure translation direction and speed to generate scrolling frames.</p>
            <div class="tool-controls" style="margin-bottom: 0.5rem;">
              <label>Dir: 
                <select id="anim-dir">
                  <option value="left">Left</option>
                  <option value="right">Right</option>
                  <option value="up">Up</option>
                  <option value="down">Down</option>
                </select>
              </label>
              <label>Speed (px): <input type="number" id="anim-speed" value="2" min="1"></label>
            </div>
            <button id="btn-generate-anim" class="btn secondary">Generate Anim Frames</button>
          </div>
        </section>
        </div>

        <!-- Sidebar Timeline Panel -->
        <section class="panel timeline-panel">
          <div class="timeline-header" style="flex-direction: column; align-items: stretch; gap: 0.5rem;">
            <h2>Frames</h2>
            <div class="timeline-actions" style="display: flex; flex-direction: column; gap: 0.5rem;">
              <button id="btn-add-frame" class="btn">Add Frame</button>
              <button id="btn-dup-frame" class="btn">Duplicate Frame</button>
              <button id="btn-del-frame" class="btn danger outline">Delete Frame</button>
            </div>
          </div>
          <div class="timeline-frames" id="timeline-container">
            <!-- Frame thumbnails will be generated here -->
          </div>
        </section>
      </main>
    </div>

    <!-- Custom Modal Dialog -->
    <dialog id="custom-modal" class="modal">
      <div class="modal-content">
        <h3 id="modal-title">Notice</h3>
        <p id="modal-message">Message goes here</p>
        <div class="modal-actions">
          <button id="modal-btn-cancel" class="btn outline form-cancel">Cancel</button>
          <button id="modal-btn-confirm" class="btn primary form-confirm">OK</button>
        </div>
      </div>
    </dialog>
    
    <script type="module" src="./main.js"></script>
  </body>
</html>
